<!DOCTYPE html>
<html>
<head>
  <title>Experiment 2.2.3</title>
</head>
<body style="font-family: Arial; text-align:center; background:#0f172a; color:white">

<h1>Experiment 2.2.3 — Transactions</h1>

<input id="token" placeholder="JWT Token"><br><br>

<button onclick="getBalance()">Check Balance</button>

<p id="result"></p>

<script>
async function getBalance() {
  const res = await fetch("https://YOUR-URL-3.onrender.com/api/transactions/balance", {
    headers: {
      "Authorization": document.getElementById("token").value
    }
  });

  const data = await res.json();
  document.getElementById("result").innerText = JSON.stringify(data);
}
</script>

</body>
</html>
